name: Build and Deploy on my server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy to server
        run: |
          rsync -a --delete ${{ vars.BUILD_DIR }}/ ${{ vars.DEPLOY_PATH }}/
          echo "✅ Deployed successfully"

